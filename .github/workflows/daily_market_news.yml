name: Daily Market News

on:
  schedule:
    # 每天早上 9 点 UTC+8 = 1 点 UTC 运行
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run market news script
        run: |
          chmod +x scripts/crawl_all.sh
          ./scripts/crawl_all.sh >> logs/cron.log 2>&1