name: Auto Crawl Penalty Data

on:
  schedule:
    # 每天上午9点执行
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Crawl penalty data
        run: |
          python scripts/crawl_penalty.py
      
      - name: Commit and Push
        run: |
          git config --local user.email "bot@example.com"
          git config --local user.name "Auto Bot"
          git add data/
          git commit -m "feat: 自动更新处罚数据 $(date '+%Y-%m-%d')" || exit 0
          git push